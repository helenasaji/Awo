<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanning...</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        body {
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            background: radial-gradient(circle at top left, #ffb703, #fb8500, #1d3557); 
            color: white; 
            font-family: 'Poppins', sans-serif; 
            overflow: hidden; 
            transition: background 0.5s ease;
        }

        /* THE MISSING PIECE I ACCIDENTALLY DELETED! */
        .container {
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        /* --- MAGIC WAND EMOJIS --- */
        #emojis-container { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 5; 
            pointer-events: none; 
        }

        .emoji { 
            position: absolute; 
            font-size: 2rem; 
            opacity: 0; 
            animation: float 6s linear infinite backwards; 
        }
        
        .emoji:nth-child(1) { left: 10%; animation-delay: 0s; }
        .emoji:nth-child(2) { left: 80%; animation-delay: 1.5s; }
        .emoji:nth-child(3) { left: 50%; animation-delay: 3s; }
        .emoji:nth-child(4) { left: 25%; animation-delay: 4.5s; }

        @keyframes float {
            0% { transform: translateY(100vh); opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }

        /* --- 3D FLIP CONTAINER STYLES --- */
        .flip-container {
            perspective: 1000px;
            width: 90%; 
            max-width: 400px; 
            height: 500px; /* Hard height so it NEVER collapses */
            margin: 0 auto; 
            position: relative; 
        }

        .flipper {
            transition: 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            transform-style: preserve-3d;
            position: relative;
            width: 100%;
            height: 100%; 
        }

        .flipper.flipped {
            transform: rotateY(180deg);
        }

        /* Structure for both faces of the card */
        .card-face {
            backface-visibility: hidden;
            position: absolute; 
            top: 0; 
            left: 0;
            width: 100%;
            height: 100%; 
            padding: 40px 20px; 
            border-radius: 35px; 
            background: rgba(255, 255, 255, 0.12); 
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.15); 
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35); 
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .front {
            z-index: 2;
            transform: rotateY(0deg);
        }

        .back {
            transform: rotateY(180deg);
        }

        /* Front Content */
        .tag {
            display: inline-block;
            background: white; 
            color: #fb8500; 
            font-weight: 700;
            padding: 8px 18px; 
            border-radius: 999px; 
            font-size: 0.9rem; 
            margin-bottom: 25px; 
        }

        .front h1 { font-size: 2.2rem; margin-bottom: 30px; line-height: 1.2; }
        .counter { font-size: 7.5rem; font-weight: 800; text-shadow: 0 0 15px rgba(255, 255, 255, 0.5), 0 0 40px rgba(255, 183, 3, 0.7); transition: 0.2s; line-height: 1; }
        .years { font-size: 1.8rem; font-weight: 600; margin-top: 5px; }

        /* Back Content (The Reveal) */
        .achu-pic {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 20px;
            border: 5px solid white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            margin-bottom: 25px;
        }

        .main-text {
            font-size: 1.3rem; 
            font-weight: 800; 
            display: inline-block; 
            padding: 10px 18px; 
            border-radius: 18px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.18), rgba(255, 224, 102, 0.28)); 
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        /* --- CHELAV MODAL --- */
        .modal-card {
            display: none; 
            background: white; 
            padding: 20px; 
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            text-align: center; 
            z-index: 20;
            width: 300px !important; 
            height: 300px !important; 
            margin: 0 auto;
            position: relative;
            transform: translateY(-200%); 
            animation: dropIn 0.8s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes dropIn { to { transform: translateY(0); } }
        
        .modal-card h2 { color: #333; margin-top: 10px; margin-bottom: 20px; font-size: 2.2rem; }

        .buttons { position: relative; width: 100%; height: 60px; margin: 0 auto; }
        
        .modal-card button { 
            position: absolute; width: 100px; height: 40px; border: none; border-radius: 8px; 
            font-size: 15px; cursor: pointer; font-weight: bold; color: white; 
        }
        
        #btn-yes { left: 15px; top: 0; background-color: #2ecc71; transition: 0.2s; }
        #btn-yes:hover { background-color: #27ae60; transform: scale(1.05); }
        
        #btn-no { right: 15px; top: 0; background-color: #e74c3c; transition: left 0.08s ease-out, top 0.08s ease-out, right 0.08s ease-out !important; }

        .chelav-gif { width: 100%; max-width: 150px; height: 100px; object-fit: contain; border-radius: 8px; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="emojis-container">
        <div class="emoji">🪄</div>
        <div class="emoji">🪄</div>
        <div class="emoji">🪄</div>
        <div class="emoji">🪄</div>
    </div>

    <div class="container">
        <div class="flip-container" id="scanner-container">
            <div class="flipper" id="flipper">
                
                <div class="front card-face">
                    <div class="tag">AI Birthday Scanner</div>
                    <h1>What age are you turning this year? 🤔</h1>
                    <div class="counter" id="counter">0</div>
                    <div class="years">Years Old</div>
                </div>

                <div class="back card-face">
                    <img src="Folder/sticker5.png" alt="Achu" class="achu-pic">
                    <div class="main-text">🎉 Shashtipoorthi Ashamsakal Nenbo 👴</div>
                </div>

            </div>
        </div>

        <div class="modal-card" id="bill-container">
            <h2><b>Chelav</b></h2>
            <div class="buttons">
                <button id="btn-yes">Tharum</button>
                <button id="btn-no">Tharoola</button>
            </div>
            <img src="Folder/gimme.gif" alt="Chelav GIF" class="chelav-gif">
        </div>
    </div>

    <script>
        const scannerContainer = document.getElementById('scanner-container');
        const flipper = document.getElementById('flipper');
        const emojisContainer = document.getElementById('emojis-container');
        const billContainer = document.getElementById('bill-container');
        const counter = document.getElementById("counter");
        const btnNo = document.getElementById('btn-no');
        const btnYes = document.getElementById('btn-yes');
        const btnContainer = document.querySelector('.buttons');
        
        let count = 0;
        const target = 60;

        setTimeout(updateCounter, 800);

        function updateCounter() {
            if (count < target) {
                count++;
                counter.innerText = count;
                counter.style.transform = "scale(1.15) rotate(2deg)";
                
                setTimeout(() => { 
                    counter.style.transform = "scale(1) rotate(0deg)"; 
                }, 100);
                
                setTimeout(updateCounter, 35);
            } else {
                setTimeout(() => {
                    flipper.classList.add('flipped');
                }, 400);
                
                setTimeout(() => {
                    scannerContainer.style.display = 'none';
                    emojisContainer.style.display = 'none';
                    document.body.style.background = "#f4f7f6"; 
                    billContainer.style.display = 'block';
                }, 3400); 
            }
        }

        function dodgeButton() {
            btnNo.style.transform = "none";
            btnNo.style.right = "auto"; 
            
            const maxX = btnContainer.clientWidth - btnNo.offsetWidth;
            const maxY = btnContainer.clientHeight - btnNo.offsetHeight;
            
            btnNo.style.left = Math.floor(Math.random() * maxX) + "px";
            btnNo.style.top = Math.floor(Math.random() * maxY) + "px";
        }

        btnNo.addEventListener('mouseenter', dodgeButton);
        btnNo.addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            dodgeButton(); 
        });

        btnYes.addEventListener('click', () => {
            window.location.href = 'good.html';
        });
    </script>
</body>
</html>
